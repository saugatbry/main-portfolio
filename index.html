      body {

      /* Custom Cursor Styles */
      .custom-cursor {
        width: 20px;
        height: 20px;
        border: 2px solid #00f3ff;
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 9999;
        transition: transform 0.1s ease;
        mix-blend-mode: difference;
      }
      .custom-cursor::after {
        content: '';
        width: 4px;
        height: 4px;
        background: #00f3ff;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 10px #00f3ff;
      }
    </style>
